<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap 4 Icons - All In One</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Font Awesome 5 Icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body>

<!-- Navbar with Icons -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
  <a class="navbar-brand" href="#">
    <i class="fas fa-laptop-code"></i> MyWebsite
  </a>

  <ul class="navbar-nav ml-auto">
    <li class="nav-item">
      <a class="nav-link" href="#"><i class="fas fa-home"></i> Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#"><i class="fas fa-user"></i> Profile</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#"><i class="fas fa-envelope"></i> Contact</a>
    </li>
  </ul>
</nav>

<div class="container mt-5 text-center">

  <h2 class="mb-4">Bootstrap 4 Icons - All In One Demo</h2>

  <!-- Large Colored Icons -->
  <div class="row mb-5">
    <div class="col-md-4">
      <i class="fas fa-heart fa-4x text-danger"></i>
      <p>Love</p>
    </div>
    <div class="col-md-4">
      <i class="fas fa-star fa-4x text-warning"></i>
      <p>Rating</p>
    </div>
    <div class="col-md-4">
      <i class="fas fa-thumbs-up fa-4x text-success"></i>
      <p>Like</p>
    </div>
  </div>

  <!-- Buttons with Icons -->
  <div class="mb-5">
    <button class="btn btn-primary m-2">
      <i class="fas fa-download"></i> Download
    </button>

    <button class="btn btn-success m-2">
      <i class="fas fa-check"></i> Submit
    </button>

    <button class="btn btn-danger m-2">
      <i class="fas fa-trash"></i> Delete
    </button>
  </div>

  <!-- Animated Icons -->
  <div class="mb-5">
    <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
    <p>Loading...</p>
  </div>

  <!-- Cards with Icons -->
  <div class="row mb-5">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <i class="fas fa-code fa-2x text-primary"></i>
          <h5 class="card-title mt-3">Development</h5>
          <p class="card-text">We build modern web applications.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <i class="fas fa-paint-brush fa-2x text-danger"></i>
          <h5 class="card-title mt-3">Design</h5>
          <p class="card-text">Creative and responsive designs.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <i class="fas fa-chart-line fa-2x text-success"></i>
          <h5 class="card-title mt-3">Marketing</h5>
          <p class="card-text">Grow your business online.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Social Media Icons -->
  <div class="mb-5">
    <a href="#" class="text-primary m-3">
      <i class="fab fa-facebook fa-2x"></i>
    </a>
    <a href="#" class="text-info m-3">
      <i class="fab fa-twitter fa-2x"></i>
    </a>
    <a href="#" class="text-danger m-3">
      <i class="fab fa-instagram fa-2x"></i>
    </a>
    <a href="#" class="text-dark m-3">
      <i class="fab fa-github fa-2x"></i>
    </a>
  </div>

</div>

<!-- Required JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
